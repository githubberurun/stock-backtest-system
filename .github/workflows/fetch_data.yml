name: Weekly Backtest System

on:
  workflow_dispatch:      # 手動実行可能

jobs:
  run-system:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pyarrow fastparquet numpy yfinance

      - name: Execute Pipeline
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: |
          # JQUANTS_API_KEYが設定されていない場合はパイプラインを停止
          if [ -z "$JQUANTS_API_KEY" ]; then
            echo "Error: JQUANTS_API_KEY is not set in secrets."
            exit 1
          fi
          
          # 1. データ取得 (対象銘柄 & ベンチマーク) & 内部テスト
          python data_fetcher.py
          
          # 2. 統合バックテスト実行 (前回のコードを backtest_runner.py と仮定)
          python backtest_runner.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            data/*.parquet
            backtest_report.csv
