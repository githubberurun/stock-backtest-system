name: Weekly Data Fetching

on:
  schedule:
    - cron: '0 0 * * 0' # 毎週日曜日に実行
  workflow_dispatch:      # 手動実行も可能にする

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pyarrow fastparquet

      - name: Run Fetcher
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python data_fetcher.py
